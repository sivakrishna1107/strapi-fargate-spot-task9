name: Build and push strapi image


on:
  workflow_dispatch:
  #push:
  #branches:
  #- main

env:
  IMAGE_NAME: strapi-task9-siva


jobs:
  build-and-push:
    runs-on: ubuntu-latest


    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          PASSWORD=$(aws ecr get-login-password --region us-east-1)
          echo $PASSWORD | docker login \
          --username AWS \
          --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories --repository-names strapi-task9-siva \
          || aws ecr create-repository --repository-name strapi-task9-siva

      - name: Build & Push
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/strapi-task9-siva:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
